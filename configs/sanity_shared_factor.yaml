# Sanity stage — shared_factor: C channels = combos of a shared periodic factor
# bank (mixed frequencies). Checks cross-channel routing (D4 variate ids): channels
# that share factors correlate, and the model should exploit that structure.

run:
  name: sanity_shared_factor
  steps: 1500
  seed: 0

backend:
  device: auto
  compile: false

model:
  d_model: 64
  n_layers: 3
  n_heads: 4
  out_patch: 8

data:
  loader: sanity
  case: shared_factor
  season_lengths: [12, 24, 48]
  channels_distribution: [2, 6]  # channel count varies per sample
  horizon: 32
  series_len: 512
  n_series: 64
  n_channels: 4

packing:
  L_pack: 256
  buffers_per_step: 4
  reservoir: true
  reservoir_k: 64
  scheduler_window: 64

eval:
  enabled: true
  loader: sanity_eval
  shard_windows: 64
